<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">AlphaSift hotspot detail terminal screenshot</title>
  <desc id="desc">A terminal screenshot showing hotspot detail output with stale cache fallback, leader stock sources, and quality metadata.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1100" height="720" fill="#eef2f8"/>
  <rect x="70" y="58" width="960" height="604" rx="24" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="70" y="58" width="960" height="54" rx="24" fill="#1f2937"/>
  <circle cx="103" cy="85" r="8" fill="#ff5f57"/>
  <circle cx="130" cy="85" r="8" fill="#ffbd2e"/>
  <circle cx="157" cy="85" r="8" fill="#28c840"/>
  <text x="550" y="91" fill="#cbd5e1" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="15">alphasift hotspot detail</text>
  <g font-family="SFMono-Regular, Consolas, 'Liberation Mono', monospace" font-size="19" fill="#e5e7eb">
    <text x="104" y="150" fill="#93c5fd">$ alphasift hotspot "AI compute" --timeline --explain</text>
    <text x="104" y="202" fill="#fbbf24">topic=AI compute  canonical_topic=AI compute  quality=stale</text>
    <text x="104" y="238" fill="#fca5a5">fallback_used=true  source=last_good_cache  stale_age_hours=1.5</text>
    <text x="104" y="292" fill="#a7f3d0">Summary</text>
    <text x="138" y="326">AI compute remains active. Live detail rows were incomplete,</text>
    <text x="138" y="358">so AlphaSift reused last-good leaders and marks their source.</text>
    <text x="104" y="412" fill="#a7f3d0">Timeline</text>
    <text x="138" y="446">2026-06-13 · News · AI compute catalyst appeared</text>
    <text x="104" y="500" fill="#a7f3d0">Leader stocks</text>
    <text x="138" y="534" fill="#cbd5e1">code    name        role          source                         confidence</text>
    <text x="138" y="568">300001  ComputeCo   core leader   last_good_cache.leader_stocks  0.65</text>
    <text x="138" y="602">600001  InfraCo     beneficiary   last_good_cache.leader_stocks  0.58</text>
    <text x="104" y="642" fill="#fca5a5">missing_fields=[live_stocks]  source_errors=[provider timeout]</text>
  </g>
</svg>
